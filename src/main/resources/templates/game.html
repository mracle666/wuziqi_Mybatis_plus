<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 游戏房间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .room-title {
            font-size: 18px;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .role-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .role-host {
            background: #4CAF50;
            color: white;
        }

        .role-guest {
            background: #2196F3;
            color: white;
        }

        .role-spectator {
            background: #9c27b0;
            color: white;
        }

        .back-btn {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .game-info {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .player-black {
            background: #333;
        }

        .player-white {
            background: #fff;
            border: 2px solid #333;
            color: #333;
        }

        .player-name {
            font-weight: bold;
            color: #333;
        }

        .player-status {
            font-size: 12px;
            color: #666;
        }

        .current-turn {
            color: #4CAF50;
            font-weight: bold;
        }

        .spectator-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .spectator-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .game-container {
            background: #dcb35c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            gap: 0;
            background: #dcb35c;
            position: relative;
        }

        .cell {
            width: 30px;
            height: 30px;
            position: relative;
            cursor: pointer;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #8b7355;
        }

        .cell::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #8b7355;
        }

        .stone {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .restart-btn {
            background: #4CAF50;
            color: white;
        }

        .restart-btn:hover {
            background: #45a049;
        }

        .activity-log {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 250px;
            max-height: 300px;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow-y: auto;
            z-index: 50;
        }

        .activity-log h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .activity-item {
            font-size: 12px;
            color: #666;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: white;
        }

        .ws-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f44336;
        }

        .ws-indicator.connected {
            background: #4CAF50;
        }

        .waiting-message {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .waiting-message h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .waiting-message p {
            color: #666;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .modal button {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="room-title">🏠 <span th:text="${room.roomName}">房间名</span></div>
        <div class="user-info">
            <span class="role-badge" th:classappend="${isPlayer and username == room.hostPlayer} ? 'role-host' : (${isPlayer and username == room.guestPlayer} ? 'role-guest' : 'role-spectator')"
                  th:text="${isPlayer and username == room.hostPlayer} ? '房主(黑棋)' : (${isPlayer and username == room.guestPlayer} ? '对手(白棋)' : '观战者')">
            </span>
            <div class="ws-status">
                <div class="ws-indicator" id="wsIndicator"></div>
                <span id="wsStatusText">未连接</span>
            </div>
            <a href="#" class="back-btn" onclick="leaveRoom()">返回大厅</a>
        </div>
    </div>

    <div class="game-info">
        <div class="player-info">
            <div class="player-avatar player-black">黑</div>
            <div>
                <div class="player-name" th:text="${room.hostPlayer}">房主</div>
                <div class="player-status" id="blackStatus">等待中</div>
            </div>
        </div>
        
        <div>
            <span>当前回合: </span>
            <span id="currentPlayer" style="font-weight: bold;">黑棋</span>
        </div>
        
        <div class="player-info">
            <div>
                <div class="player-name" th:text="${room.guestPlayer != null} ? ${room.guestPlayer} : '等待加入...'">等待加入</div>
                <div class="player-status" id="whiteStatus">等待中</div>
            </div>
            <div class="player-avatar player-white">白</div>
        </div>
    </div>

    <div class="spectator-info" style="background: white; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px;">
        <span>👥 观战者:</span>
        <span class="spectator-count" id="spectatorCount" th:text="${spectatorCount}">0</span>
    </div>

    <div th:if="${room.status == 0 and room.guestPlayer == null}" class="waiting-message">
        <h2>⏳ 等待对手加入...</h2>
        <p>分享房间给好友，或等待其他玩家加入</p>
    </div>

    <div class="game-container">
        <div id="board"></div>
    </div>

    <div class="buttons" th:if="${isPlayer}">
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="activity-log">
        <h3>📋 实时动态</h3>
        <div id="activityList"></div>
    </div>

    <div class="overlay" id="winnerOverlay">
        <div class="modal">
            <h2 id="winnerText">黑棋获胜!</h2>
            <button onclick="closeWinnerModal()">确定</button>
        </div>
    </div>

    <input type="hidden" id="roomId" th:value="${room.id}">
    <input type="hidden" id="username" th:value="${username}">
    <input type="hidden" id="isPlayer" th:value="${isPlayer}">
    <input type="hidden" id="isHost" th:value="${username == room.hostPlayer}">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        const _tabId = sessionStorage.getItem('tabId') || '';
        function tabUrl(url) {
            return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'tabId=' + _tabId;
        }

        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        let currentPlayer = BLACK;
        let gameOver = false;
        let stompClient = null;
        let connected = false;
        let board = [];

        const roomId = document.getElementById('roomId').value;
        const username = document.getElementById('username').value;
        const isPlayer = document.getElementById('isPlayer').value === 'true';
        const isHost = document.getElementById('isHost').value === 'true';

        function initBoard() {
            board = [];
            for (let i = 0; i < 15; i++) {
                board[i] = [];
                for (let j = 0; j < 15; j++) {
                    board[i][j] = EMPTY;
                }
            }
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let i = 0; i < 15; i++) {
                for (let j = 0; j < 15; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (!isPlayer || gameOver) {
                        cell.classList.add('disabled');
                    }
                    
                    if (board[i][j] !== EMPTY) {
                        const stone = document.createElement('div');
                        stone.className = 'stone ' + (board[i][j] === BLACK ? 'black' : 'white');
                        cell.appendChild(stone);
                    }
                    
                    cell.addEventListener('click', function() {
                        makeMove(i, j);
                    });
                    
                    boardDiv.appendChild(cell);
                }
            }
        }

        function addActivity(text) {
            const list = document.getElementById('activityList');
            const item = document.createElement('div');
            item.className = 'activity-item';
            const time = new Date().toLocaleTimeString('zh-CN');
            item.innerHTML = `<span>${text}</span><div style="color:#999;font-size:10px;">${time}</div>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }
        }

        function connectWebSocket() {
            const socket = new SockJS('/ws/game');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                connected = true;
                updateWsStatus(true);
                addActivity('已连接到游戏服务器');
                
                stompClient.subscribe('/topic/room/' + roomId, function(message) {
                    handleGameMessage(JSON.parse(message.body));
                });
                
                stompClient.send('/app/room.join', {}, JSON.stringify({
                    roomId: roomId,
                    username: username,
                    isPlayer: isPlayer
                }));
            }, function(error) {
                connected = false;
                updateWsStatus(false);
                addActivity('连接失败，正在重试...');
                setTimeout(connectWebSocket, 5000);
            });
        }

        function updateWsStatus(isConnected) {
            const indicator = document.getElementById('wsIndicator');
            const text = document.getElementById('wsStatusText');
            if (isConnected) {
                indicator.classList.add('connected');
                text.textContent = '已连接';
            } else {
                indicator.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        function handleGameMessage(message) {
            switch(message.type) {
                case 'MOVE':
                    board[message.row][message.col] = message.player;
                    renderBoard();
                    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                    updatePlayerDisplay();
                    if (message.gameOver) {
                        gameOver = true;
                        showWinner(message.winner === BLACK ? '黑棋' : '白棋');
                        addActivity(`🎉 游戏结束！${message.winner === BLACK ? '黑棋' : '白棋'}获胜！`);
                    } else {
                        addActivity(`${message.username} 落子 (${message.row}, ${message.col})`);
                    }
                    break;
                case 'JOIN':
                    addActivity(`👋 ${message.username} ${message.isPlayer ? '加入对战' : '加入观战'}`);
                    if (message.guestPlayer) {
                        document.querySelector('.player-name:last-of-type').textContent = message.guestPlayer;
                    }
                    break;
                case 'LEAVE':
                    addActivity(`👋 ${message.username} 离开了房间`);
                    break;
                case 'START':
                    // 隐藏等待提示框
                    var waitingMsg = document.querySelector('.waiting-message');
                    if (waitingMsg) waitingMsg.style.display = 'none';
                    addActivity('🎮 游戏开始！双方已就位');
                    break;
                case 'WAITING':
                    // 对手退出，显示等待提示框
                    var wm = document.querySelector('.waiting-message');
                    if (wm) wm.style.display = 'block';
                    initBoard();
                    renderBoard();
                    currentPlayer = BLACK;
                    gameOver = false;
                    updatePlayerDisplay();
                    addActivity(`⏳ ${message.message}`);
                    break;
                case 'ROOM_CLOSED':
                    addActivity('房间已解散');
                    setTimeout(function() { window.location.href = tabUrl('/'); }, 500);
                    break;
                case 'RESET':
                    initBoard();
                    renderBoard();
                    currentPlayer = BLACK;
                    gameOver = false;
                    updatePlayerDisplay();
                    addActivity(`🔄 游戏已重置`);
                    break;
                case 'SPECTATOR_COUNT':
                    document.getElementById('spectatorCount').textContent = message.spectatorCount;
                    break;
            }
        }

        function updatePlayerDisplay() {
            document.getElementById('currentPlayer').textContent = currentPlayer === BLACK ? '黑棋' : '白棋';
            document.getElementById('blackStatus').textContent = currentPlayer === BLACK ? '思考中...' : '等待';
            document.getElementById('whiteStatus').textContent = currentPlayer === WHITE ? '思考中...' : '等待';
        }

        function makeMove(row, col) {
            if (!isPlayer || gameOver || board[row][col] !== EMPTY) {
                return;
            }
            
            if ((currentPlayer === BLACK && !isHost) || (currentPlayer === WHITE && isHost)) {
                return;
            }

            if (connected && stompClient) {
                stompClient.send('/app/room.move', {}, JSON.stringify({
                    roomId: roomId,
                    username: username,
                    row: row,
                    col: col,
                    player: currentPlayer
                }));
            }
        }

        function restartGame() {
            if (connected && stompClient) {
                stompClient.send('/app/room.reset', {}, JSON.stringify({
                    roomId: roomId,
                    username: username
                }));
            }
        }

        function showWinner(winner) {
            document.getElementById('winnerText').textContent = `${winner}获胜!`;
            document.getElementById('winnerOverlay').style.display = 'flex';
        }

        function closeWinnerModal() {
            document.getElementById('winnerOverlay').style.display = 'none';
        }

        let leaving = false;

        function leaveRoom() {
            if (leaving) return;
            leaving = true;
            if (connected && stompClient) {
                stompClient.send('/app/room.leave', {}, JSON.stringify({
                    roomId: roomId,
                    username: username,
                    isPlayer: isPlayer
                }));
                try { stompClient.disconnect(); } catch(e) {}
            }
            window.location.href = tabUrl('/');
        }

        window.onbeforeunload = function() {
            leaveRoom();
        };

        initBoard();
        renderBoard();
        connectWebSocket();
    </script>
</body>
</html>
